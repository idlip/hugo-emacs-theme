{{ define "main" }}
{{- if .Content }}

<section class="buffer buffer-content active"
         id="buffer-content"
         role="region"
         aria-label="Home"
         tabindex="0">
  <div class="buffer-body">
    <article class="post-content">
      {{ .Content }}
    </article>
    <footer>{{ partial "footer" . }}</footer>
  </div>

  {{ partial "modeline.html" (dict
    "buffer"   "*home*"
    "mode"     "Org"
    "readonly" true
    "keyhint"  "<kbd>q</kbd> back"
  ) }}
</section>

{{- else }}
{{ partial "post-listing.html" . }}
{{- end }}
{{ end }}
